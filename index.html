<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aso Chat</title>
<link rel="stylesheet" href="style.css">
<script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo-wrap"><img id="logo" src="https://www.image2url.com/r2/default/images/1776691290648-eacc2840-7e26-42bb-bd70-73eeae524dba.png" alt="Aso"></div>
    <button id="settingsBtn">⚙️ Configurar</button>
    <div id="history"></div>
  </aside>

  <main class="chat-area">
    <header>
      <select id="model">
        <option value="aso-mini">Aso Mini resposta rápida</option>
        <option value="aso-raciocinio">Aso Raciocínio 1.0</option>
      </select>
    </header>

    <div id="messages"></div>

    <div class="input-bar">
      <div class="h-captcha" data-sitekey="4ff02d84-7946-49c8-bd4e-67ec3064a4cc" data-size="invisible" id="hcaptcha"></div>
      <textarea id="input" placeholder="Digite sua mensagem..."></textarea>
      <button id="send">Enviar</button>
    </div>
  </main>
</div>

<div id="settingsModal" class="modal">
  <div class="modal-content">
    <h3>Configurações</h3>
    <label>Instrução do Sistema</label>
    <textarea id="systemPrompt">Você é o assistente Aso, útil e direto.</textarea>
    <label><input type="checkbox" id="thinking"> Thinking Mode</label>

    <h4>Sub-Agentes</h4>
    <div id="agentsList"></div>
    <button id="addAgent">+ Adicionar Agente</button>
    <button id="saveSettings">Salvar</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
