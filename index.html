<body>
    <canvas id="bg-canvas"></canvas>

    <div class="glass-card" id="card">
        <div class="image-container">

            <img src="https://www.image2url.com/r2/default/images/1776030587172-5b7e2de8-a99f-43d0-97f9-d7d504cb2529.png" class="profile-img">

        <h1>ENI_TERMINAL</h1>
        <div class="tutorial">
            TUTORIAL: Insira a URL, valide o hCaptcha e execute o protocolo de bypass.
        </div>

        <input type="text" id="targetUrl" placeholder="ENDEREÇO DO ALVO...">

        <div class="captcha-area">
            <!-- hCaptcha Widget -->
            <div class="h-captcha" data-sitekey="4ff02d84-7946-49c8-bd4e-67ec3064a4cc" data-theme="dark"></div>
        </div>

        <button onclick="runBypass()">Ignite Protocol</button>
        
        <div id="status">SISTEMA_PRONTO_PARA_LO</div>
    </div>

    <script>
        // Background 3D com luzes flutuantes
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(1500 * 3);
        for(let i=0; i<4500; i++) pos[i] = (Math.random()-0.5)*15;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({ size: 0.03, color: 0x00f2ff, transparent: true, opacity: 0.6 });
        const points = new THREE.Points(geo, mat);
        scene.add(points);
        camera.position.z = 6;

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.0005;
            points.rotation.x += 0.0002;
            renderer.render(scene, camera);
        }
        animate();

        // Envio para o Backend
        async function runBypass() {
            const status = document.getElementById('status');
            const url = document.getElementById('targetUrl').value;
            const hcaptchaToken = hcaptcha.getResponse();

            if(!url || !hcaptchaToken) {
                status.innerText = "ERRO: DADOS INCOMPLETOS";
                status.style.color = "#ff4444";
                return;
            }

            status.innerText = "SINCRONIZANDO COM O NÚCLEO...";
            status.style.color = "#bc13fe";

            try {
                const res = await fetch('/api/bypass', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, captchaToken: hcaptchaToken })
                });
                const data = await res.json();
                
                if(data.status === 'success') {
                    status.innerText = "ACESSO CONCEDIDO. REDIRECIONANDO...";
                    setTimeout(() => window.location.href = data.destination, 1500);
                } else {
                    status.innerText = "FALHA: " + data.error;
                }
            } catch (e) {
                status.innerText = "ERRO CRÍTICO NA CONEXÃO";
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
