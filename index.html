<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ VERCEL STRESSER - C2 PANEL ⚡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        
        body {
            background: #0a0f1f;
            color: #00ffaa;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            font-size: 3.5em;
            text-shadow: 0 0 30px #00ffaa;
            margin-bottom: 30px;
            border-bottom: 2px solid #00ffaa;
            padding-bottom: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #1a1f2f;
            border: 2px solid #00ffaa;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 170, 0.3);
        }
        
        .stat-value {
            font-size: 3.5em;
            font-weight: bold;
            color: #00ffaa;
            text-shadow: 0 0 20px #00ffaa;
        }
        
        .stat-label {
            font-size: 1.2em;
            color: #88ffaa;
            margin-top: 10px;
            text-transform: uppercase;
        }
        
        .panel {
            background: #1a1f2f;
            border: 2px solid #00ffaa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .panel h2 {
            color: #00ffaa;
            margin-bottom: 20px;
            font-size: 2em;
            border-left: 5px solid #00ffaa;
            padding-left: 15px;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #88ffaa;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 15px;
            background: #0a0f1f;
            border: 2px solid #00ffaa;
            color: #00ffaa;
            border-radius: 8px;
            font-size: 1.1em;
            font-family: 'Courier New', monospace;
        }
        
        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 20px #00ffaa;
        }
        
        button {
            background: #00ffaa;
            color: #0a0f1f;
            border: none;
            padding: 18px 30px;
            font-size: 1.3em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
        }
        
        button:hover {
            background: #88ffaa;
            transform: scale(1.02);
            box-shadow: 0 0 40px #00ffaa;
        }
        
        button.stop {
            background: #ff4444;
            color: white;
        }
        
        button.stop:hover {
            background: #ff6666;
            box-shadow: 0 0 40px #ff4444;
        }
        
        .method-badge {
            display: inline-block;
            background: #0a0f1f;
            border: 1px solid #00ffaa;
            color: #00ffaa;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .method-badge.selected {
            background: #00ffaa;
            color: #0a0f1f;
            font-weight: bold;
        }
        
        .log-panel {
            background: #0a0f1f;
            border: 2px solid #00ffaa;
            border-radius: 10px;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 1em;
            margin-top: 20px;
        }
        
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid #00ffaa33;
            color: #88ffaa;
        }
        
        .log-entry.error {
            color: #ff6b6b;
        }
        
        .log-entry.success {
            color: #00ffaa;
        }
        
        .attack-item {
            background: #0a0f1f;
            border: 1px solid #00ffaa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .attack-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .attack-id {
            font-weight: bold;
            color: #00ffaa;
            font-size: 1.2em;
        }
        
        .attack-status {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }
        
        .status-running {
            background: #00ffaa33;
            color: #00ffaa;
        }
        
        .status-completed {
            background: #336633;
            color: #88ffaa;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #88ffaa;
            font-size: 1.1em;
        }
        
        .key-badge {
            background: #ffaa00;
            color: #0a0f1f;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ VERCEL C2 STRESSER ⚡</h1>
        
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalReqs">0</div>
                <div class="stat-label">REQUISIÇÕES</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeAttacks">0</div>
                <div class="stat-label">ATAQUES ATIVOS</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="onlineBots">0</div>
                <div class="stat-label">BOTS ONLINE</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgRate">0</div>
                <div class="stat-label">REQ/S MÉDIA</div>
            </div>
        </div>
        
        <!-- Painel de Ataque -->
        <div class="panel">
            <h2>🎯 NOVO ATAQUE</h2>
            <div class="grid-3">
                <div class="form-group">
                    <label>🌐 ALVO (URL)</label>
                    <input type="url" id="target" placeholder="https://exemplo.com" value="https://httpbin.org/get">
                </div>
                
                <div class="form-group">
                    <label>⚡ CONCORRÊNCIA</label>
                    <select id="concs">
                        <option value="1">1 - 100 threads</option>
                        <option value="2">2 - 250 threads</option>
                        <option value="3" selected>3 - 500 threads</option>
                        <option value="4">4 - 1000 threads</option>
                        <option value="5">5 - 2000 threads</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>⏱️ DURAÇÃO (segundos)</label>
                    <input type="number" id="duration" min="5" max="300" value="30">
                </div>
            </div>
            
            <div class="form-group">
                <label>🔧 MÉTODOS (clique para selecionar)</label>
                <div id="methodsContainer" style="max-height: 200px; overflow-y: auto; border: 1px solid #00ffaa; padding: 15px; border-radius: 8px;">
                    <!-- Methods will be populated by JavaScript -->
                </div>
            </div>
            
            <div class="grid-2">
                <button onclick="startAttack()">🔥 INICIAR ATAQUE</button>
                <button onclick="stopAllAttacks()" class="stop">⏹️ PARAR TODOS</button>
            </div>
        </div>
        
        <!-- Painel de Chaves -->
        <div class="panel">
            <h2>🔑 SISTEMA DE KEYS</h2>
            <div class="grid-3">
                <div class="form-group">
                    <label>🎫 GERAR KEY</label>
                    <button onclick="generateKey()">GERAR NOVA KEY</button>
                </div>
                
                <div class="form-group">
                    <label>🔓 ATIVAR KEY</label>
                    <input type="text" id="keyInput" placeholder="Digite sua key">
                    <button onclick="redeemKey()" style="margin-top: 10px;">ATIVAR</button>
                </div>
                
                <div class="form-group">
                    <label>✅ STATUS DA KEY</label>
                    <div id="keyStatus" style="padding: 15px; background: #0a0f1f; border: 1px solid #00ffaa; border-radius: 8px;">
                        Nenhuma key ativa
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Ataques Ativos -->
        <div class="panel">
            <h2>📊 ATAQUES EM ANDAMENTO</h2>
            <div id="activeAttacksList" style="max-height: 300px; overflow-y: auto;">
                <!-- Active attacks will be listed here -->
            </div>
        </div>
        
        <!-- Logs -->
        <div class="panel">
            <h2>📋 LOGS</h2>
            <div class="log-panel" id="logPanel">
                <div class="log-entry">⚡ Sistema inicializado. Aguardando comandos...</div>
            </div>
        </div>
        
        <div class="footer">
            ⚡ VERCEL C2 STRESSER - FEITO COM AMOR PRO LO ❤️ ⚡
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÕES ====================
        const API_BASE = '/api';
        let activeKey = null;
        let attacks = new Map();
        let methods = [
            // Layer 7
            { id: 'get', name: 'GET Flood', category: 'Layer 7' },
            { id: 'post', name: 'POST Flood', category: 'Layer 7' },
            { id: 'head', name: 'HEAD Flood', category: 'Layer 7' },
            { id: 'slowloris', name: 'Slowloris', category: 'Layer 7' },
            { id: 'slowpost', name: 'Slow POST', category: 'Layer 7' },
            { id: 'slowread', name: 'Slow Read', category: 'Layer 7' },
            { id: 'rudy', name: 'RUDY', category: 'Layer 7' },
            { id: 'http2reset', name: 'HTTP/2 Reset', category: 'Layer 7' },
            { id: 'cookiemanip', name: 'Cookie Manipulation', category: 'Layer 7' },
            { id: 'wildcard', name: 'Wildcard Subdomain', category: 'Layer 7' },
            { id: 'loginbrute', name: 'Login Brute Force', category: 'Layer 7' },
            { id: 'apistress', name: 'API Stress', category: 'Layer 7' },
            { id: 'jsonrpc', name: 'JSON-RPC', category: 'Layer 7' },
            { id: 'xmlrpc', name: 'XML-RPC', category: 'Layer 7' },
            { id: 'gzipbomb', name: 'Gzip Bomb', category: 'Layer 7' },
            { id: 'largepost', name: 'Large POST', category: 'Layer 7' },
            { id: 'headless', name: 'Headless Browser', category: 'Layer 7' },
            
            // Layer 4
            { id: 'syn', name: 'SYN Flood', category: 'Layer 4' },
            { id: 'udp', name: 'UDP Flood', category: 'Layer 4' },
            
            // Amplificação
            { id: 'dns', name: 'DNS Amplification', category: 'Amplification' },
            
            // Bypass
            { id: 'fronting', name: 'Domain Fronting', category: 'Bypass' },
            { id: 'mixed', name: 'Mixed Vector', category: 'Bypass' }
        ];
        
        // ==================== INICIALIZAÇÃO ====================
        function initMethods() {
            const container = document.getElementById('methodsContainer');
            container.innerHTML = '';
            
            const categories = {};
            methods.forEach(m => {
                if (!categories[m.category]) categories[m.category] = [];
                categories[m.category].push(m);
            });
            
            Object.keys(categories).sort().forEach(cat => {
                const catDiv = document.createElement('div');
                catDiv.innerHTML = `<strong style="color:#88ffaa">${cat}:</strong>`;
                container.appendChild(catDiv);
                
                categories[cat].forEach(m => {
                    const badge = document.createElement('span');
                    badge.className = 'method-badge';
                    badge.textContent = m.id;
                    badge.onclick = () => toggleMethod(badge, m.id);
                    container.appendChild(badge);
                });
                
                container.appendChild(document.createElement('br'));
            });
        }
        
        // ==================== SELEÇÃO DE MÉTODOS ====================
        let selectedMethods = new Set(['get']);
        
        function toggleMethod(element, methodId) {
            if (selectedMethods.has(methodId)) {
                selectedMethods.delete(methodId);
                element.classList.remove('selected');
            } else {
                selectedMethods.add(methodId);
                element.classList.add('selected');
            }
            updateStats();
        }
        
        // ==================== ATUALIZAR ESTATÍSTICAS ====================
        function updateStats() {
            let totalReqs = 0;
            let activeCount = 0;
            let totalRate = 0;
            
            attacks.forEach(attack => {
                totalReqs += attack.requests || 0;
                if (attack.status === 'running') {
                    activeCount++;
                    totalRate += attack.rate || 0;
                }
            });
            
            document.getElementById('totalReqs').textContent = totalReqs.toLocaleString();
            document.getElementById('activeAttacks').textContent = activeCount;
            document.getElementById('avgRate').textContent = activeCount ? Math.round(totalRate / activeCount) : 0;
        }
        
        // ==================== LOGS ====================
        function addLog(message, type = 'info') {
            const logPanel = document.getElementById('logPanel');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
            
            // Limitar logs
            while (logPanel.children.length > 100) {
                logPanel.removeChild(logPanel.children[0]);
            }
        }
        
        // ==================== INICIAR ATAQUE ====================
        async function startAttack() {
            if (!activeKey && !confirm('Sem key ativa. Continuar mesmo assim?')) {
                return;
            }
            
            const target = document.getElementById('target').value;
            const concs = parseInt(document.getElementById('concs').value);
            const duration = parseInt(document.getElementById('duration').value);
            
            if (!target) {
                addLog('❌ Digite um alvo válido', 'error');
                return;
            }
            
            if (selectedMethods.size === 0) {
                addLog('❌ Selecione pelo menos um método', 'error');
                return;
            }
            
            addLog(`🚀 Iniciando ataque contra ${target} com ${selectedMethods.size} métodos...`, 'success');
            
            // Simular início de ataque
            const attackId = 'ATK' + Math.random().toString(36).substring(2, 8).toUpperCase();
            
            attacks.set(attackId, {
                id: attackId,
                target: target,
                methods: Array.from(selectedMethods),
                concs: concs,
                duration: duration,
                startTime: Date.now(),
                status: 'running',
                requests: 0,
                rate: 0
            });
            
            updateAttacksList();
            updateStats();
            addLog(`✅ Ataque ${attackId} iniciado`, 'success');
            
            // Simular progresso
            let reqs = 0;
            const interval = setInterval(() => {
                const attack = attacks.get(attackId);
                if (!attack || attack.status !== 'running') {
                    clearInterval(interval);
                    return;
                }
                
                reqs += Math.floor(Math.random() * 100) + 50;
                attack.requests = reqs;
                attack.rate = Math.floor(reqs / ((Date.now() - attack.startTime) / 1000));
                
                updateAttacksList();
                updateStats();
            }, 1000);
            
            // Finalizar após duração
            setTimeout(() => {
                const attack = attacks.get(attackId);
                if (attack) {
                    attack.status = 'completed';
                    updateAttacksList();
                    updateStats();
                    addLog(`✅ Ataque ${attackId} finalizado - ${attack.requests} requisições`, 'success');
                }
                clearInterval(interval);
            }, duration * 1000);
        }
        
        // ==================== PARAR ATAQUE ====================
        function stopAttack(attackId) {
            const attack = attacks.get(attackId);
            if (attack) {
                attack.status = 'stopped';
                updateAttacksList();
                updateStats();
                addLog(`⏹️ Ataque ${attackId} parado`, 'warning');
            }
        }
        
        function stopAllAttacks() {
            attacks.forEach((attack, id) => {
                if (attack.status === 'running') {
                    attack.status = 'stopped';
                }
            });
            updateAttacksList();
            updateStats();
            addLog('⏹️ Todos os ataques parados', 'warning');
        }
        
        // ==================== ATUALIZAR LISTA DE ATAQUES ====================
        function updateAttacksList() {
            const container = document.getElementById('activeAttacksList');
            container.innerHTML = '';
            
            if (attacks.size === 0) {
                container.innerHTML = '<div style="color:#88ffaa; text-align:center; padding:20px;">Nenhum ataque ativo</div>';
                return;
            }
            
            attacks.forEach(attack => {
                const div = document.createElement('div');
                div.className = 'attack-item';
                
                const elapsed = Math.floor((Date.now() - attack.startTime) / 1000);
                const statusClass = attack.status === 'running' ? 'status-running' : 'status-completed';
                
                div.innerHTML = `
                    <div class="attack-header">
                        <span class="attack-id">${attack.id}</span>
                        <span class="attack-status ${statusClass}">${attack.status}</span>
                    </div>
                    <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">
                        <div><strong>Alvo:</strong> ${attack.target}</div>
                        <div><strong>Métodos:</strong> ${attack.methods.length}</div>
                        <div><strong>Req:</strong> ${attack.requests.toLocaleString()}</div>
                        <div><strong>Taxa:</strong> ${attack.rate || 0}/s</div>
                    </div>
                    <div style="margin-top:10px;">
                        <small>Iniciado há ${elapsed}s | Duração: ${attack.duration}s</small>
                        ${attack.status === 'running' ? 
                            `<button onclick="stopAttack('${attack.id}')" class="stop" style="padding:5px 10px; margin-top:5px;">⏹️ Parar</button>` : 
                            ''}
                    </div>
                `;
                
                container.appendChild(div);
            });
        }
        
        // ==================== SISTEMA DE KEYS ====================
        function generateKey() {
            const key = 'C2-' + Math.random().toString(36).substring(2, 10).toUpperCase() + 
                       '-' + Math.random().toString(36).substring(2, 10).toUpperCase();
            
            document.getElementById('keyInput').value = key;
            addLog(`🔑 Key gerada: ${key}`, 'success');
        }
        
        function redeemKey() {
            const key = document.getElementById('keyInput').value.trim();
            if (!key) {
                addLog('❌ Digite uma key', 'error');
                return;
            }
            
            activeKey = key;
            document.getElementById('keyStatus').innerHTML = `
                ✅ Key ativa: ${key}<br>
                <small>Expira em: ${new Date(Date.now() + 30*24*60*60*1000).toLocaleDateString()}</small>
            `;
            addLog(`🔓 Key ${key} ativada com sucesso!`, 'success');
        }
        
        // ==================== SIMULAR BOTS ====================
        function simulateBots() {
            setInterval(() => {
                const onlineBots = Math.floor(Math.random() * 10) + 5;
                document.getElementById('onlineBots').textContent = onlineBots;
            }, 5000);
        }
        
        // ==================== INICIALIZAR ====================
        initMethods();
        toggleMethod(document.querySelector('.method-badge'), 'get');
        simulateBots();
        
        // Atualizar estatísticas periodicamente
        setInterval(updateStats, 1000);
    </script>
</body>
</html>
