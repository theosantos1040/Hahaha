    <script>
        // Background 3D Particles
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(1000 * 3);
        for(let i=0; i<3000; i++) pos[i] = (Math.random()-0.5)*10;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({ size: 0.02, color: 0xa855f7 });
        const points = new THREE.Points(geo, mat);
        scene.add(points);
        camera.position.z = 5;
        function anim() { requestAnimationFrame(anim); points.rotation.y += 0.001; renderer.render(scene, camera); }
        anim();

        // Lógica de Envio para o Backend Vercel
        async function execute() {

            if(!url || !token) return status.innerText = "ERRO: PREENCHA TUDO";

                const response = await fetch('/api/bypass', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, captchaToken: token })
